services:
  nginx:
    image: nginx:alpine
    container_name: finance-ai-load-balancer
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - backend-infra
    restart: unless-stopped

  backend:
    build:
      context: ./finance-ai-backend
      dockerfile: Dockerfile
    depends_on:
      - rabbitmq
    env_file:
      - .env
    networks:
      - broker-backend
      - backend-infra
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/test || exit 1"]
      interval: 40s
      timeout: 5s
      retries: 3
      start_period: 50s

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: finance-ai-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBIT_MQ_DEFAULT_USER=guest
      - RABBIT_MQ_DEFAULT_PASS=guest
    volumes:
      - finance-mq:/etc/data
    networks:
      - broker-backend

volumes:
  finance-mq:
networks:
  broker-backend:
    driver: bridge
  backend-infra:
    driver: bridge
