# Nginx configuration for Spendly application
server {
    listen 80;
    server_name spendly.souvikb.in spendly-api.souvikb.in spendly-ai.souvikb.in;
    return 301 https://$host$request_uri;
}

# Frontend - spendly.souvikb.in
server {
    listen 443 ssl;
    server_name spendly.souvikb.in;

    ssl_certificate /etc/letsencrypt/live/spendly.souvikb.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spendly.souvikb.in/privkey.pem;

    # Block sensitive files
    location ~ /\.(env|git|bak|config|sql|log|htaccess|htpasswd)$ {
        deny all;
        return 404;
    }
    # Block sensitive paths
    location ~ ^/(public/)?\.(env|git) {
        deny all;
        return 404;
    }
    # Block common scanner paths
    location ~ ^/(wp-admin|wp-login|phpmyadmin|admin\.php) {
        deny all;
        return 404;
    }
    # Block scanner user agents
    if ($http_user_agent ~* (zgrab|nikto|sqlmap|nmap|masscan|censys|shodan)) {
        return 403;
    }

    # Logging
    access_log /var/log/nginx/spendly-frontend-access.log;
    error_log /var/log/nginx/spendly-frontend-error.log;

    # Client body size limit
    client_max_body_size 10M;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# API - spendly-api.souvikb.in
server {
    listen 443 ssl;
    server_name spendly-api.souvikb.in;

    ssl_certificate /etc/letsencrypt/live/spendly.souvikb.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spendly.souvikb.in/privkey.pem;
    
    # Logging
    access_log /var/log/nginx/spendly-api-access.log;
    error_log /var/log/nginx/spendly-api-error.log;

    # Client body size limit
    client_max_body_size 10M;

    location / {
        proxy_pass http://api:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeouts for API requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# Backend (AI) - spendly-ai.souvikb.in
server {
    listen 443 ssl;
    server_name spendly-ai.souvikb.in;
 
    ssl_certificate /etc/letsencrypt/live/spendly.souvikb.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spendly.souvikb.in/privkey.pem;
 
    # Block sensitive files
    location ~ /\.(env|git|bak|config|sql|log)$ {
        deny all;
        return 404;
    }

    # Logging
    access_log /var/log/nginx/spendly-ai-access.log;
    error_log /var/log/nginx/spendly-ai-error.log;

    # Client body size limit
    client_max_body_size 10M;

    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
