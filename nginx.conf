events {
    worker_connections 1024;
}
http {
    limit_req_zone $binary_remote_addr zone=ip:10m rate=30r/s;
    upstream backend {
        server finance-ai-infrastructure-backend-1:8000 weight=3 max_conns=10;
        server finance-ai-infrastructure-backend-2:8000 weight=3 max_conns=10;
        server finance-ai-infrastructure-backend-3:8000 weight=3 max_conns=10;
        server finance-ai-infrastructure-backend-4:8000 weight=3 max_conns=10;
        server finance-ai-infrastructure-backend-5:8000 weight=3 max_conns=10;
    }
    server {
        listen 80;
        location /load-balancer/health {
            access_log off;
            add_header Content-Type text/plain always;
            return 200 "Nginx Load Balancer OK\n";
        }
        location / {
            limit_req zone=ip burst=12 delay=5;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_pass http://backend;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header X-Powered-By;
            proxy_pass_header Server;
        }
    }
}
