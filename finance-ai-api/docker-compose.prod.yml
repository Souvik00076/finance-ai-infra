version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: finance-ai-api-prod
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    # Production command with optimized settings
    command: >
      uvicorn app.main:app 
      --host 0.0.0.0 
      --port 8000 
      --workers 1
      --loop uvloop
      --http httptools
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - finance-ai-network

networks:
  finance-ai-network:
    driver: bridge
